name: Generate market podcast

on:
  schedule:
    # GitHub cron remains as a fallback. The primary clock is an external
    # authenticated issue trigger created by ChatGPT Automations.
    - cron: "30,45 10 * * 1-5"
    - cron: "*/15 11-12 * * 1-5"
    - cron: "*/15 21-22 * * 1-5"
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      edition:
        description: Edição a gerar
        required: true
        type: choice
        options:
          - abertura
          - fechamento

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: market-podcast
  cancel-in-progress: false

jobs:
  generate:
    # Issue signals are accepted only from the repository owner and only with
    # one of the two exact scheduler titles, preventing public abuse.
    if: >-
      github.event_name != 'issues' ||
      (github.actor == github.repository_owner &&
       (github.event.issue.title == '[scheduler] abertura' ||
        github.event.issue.title == '[scheduler] fechamento'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select edition
        id: edition
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.edition }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            case "${{ github.event.issue.title }}" in
              "[scheduler] abertura") echo "value=abertura" >> "$GITHUB_OUTPUT" ;;
              "[scheduler] fechamento") echo "value=fechamento" >> "$GITHUB_OUTPUT" ;;
              *) echo "Sinal de agendamento inválido."; exit 1 ;;
            esac
          elif [ "${{ github.event.schedule }}" = "30,45 10 * * 1-5" ] || [ "${{ github.event.schedule }}" = "*/15 11-12 * * 1-5" ]; then
            echo "value=abertura" >> "$GITHUB_OUTPUT"
          else
            echo "value=fechamento" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether episode is needed
        id: needed
        shell: bash
        env:
          EDITION: ${{ steps.edition.outputs.value }}
        run: |
          EPISODE_DATE="$(TZ=America/Sao_Paulo date +%F)"
          EPISODE_PATH="docs/episodes/${EPISODE_DATE}-${EDITION}.mp3"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ ! -f "$EPISODE_PATH" ]; then
            echo "Episódio ausente; iniciando geração de $EDITION."
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "Episódio já publicado em $EPISODE_PATH; verificação encerrada sem gerar duplicidade."
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.needed.outputs.value == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.needed.outputs.value == 'true'
        run: pip install -r requirements.txt

      - name: Generate editorial episode
        if: steps.needed.outputs.value == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
        run: python generate.py --edition "${{ steps.edition.outputs.value }}"

      - name: Commit episode
        if: steps.needed.outputs.value == 'true'
        shell: bash
        run: |
          git config user.name "market-podcast-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git commit -m "publish ${{ steps.edition.outputs.value }} $(TZ=America/Sao_Paulo date +%F)" || exit 0
          git push

      - uses: actions/configure-pages@v5
        if: steps.needed.outputs.value == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.needed.outputs.value == 'true'
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        if: steps.needed.outputs.value == 'true'

      - name: Close scheduler signal
        if: github.event_name == 'issues' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --reason completed --comment "Sinal automático processado pelo workflow do podcast."
